  <h3>Соколовы, Тула — Москва</h3>
  <p>Мария родилась в период крупных социальных изменений. Семья жила в Туле до <em>эвакуации 1941 года</em>, после чего след ведёт в Москву.</p>
  <p>Дата рождения остаётся спорной: семейный рассказ называет 1928 год, тогда как архивный документ — 1930-й. Обе версии сохранены.</p>
