<!-- @dsCard group="Colors" viewport="700x172" name="Confidence & conflict" subtitle="Signature semantics — trust levels + contradiction" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg-app); }
  h4 { font: var(--w-semibold) 11px/1 var(--font-sans); letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 12px; }
  .scale { display: flex; gap: 10px; flex-wrap: wrap; }
  .item { width: 150px; background: var(--surface-card); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 11px 12px; }
  .dot { width: 12px; height: 12px; border-radius: 999px; display: inline-block; vertical-align: middle; }
  .lvl { font: var(--w-semibold) 13px/1 var(--font-sans); color: var(--text-strong); margin-left: 7px; }
  .pct { font: var(--w-semibold) 12px/1 var(--font-mono); color: var(--text-muted); float: right; }
  .desc { font: 11px/1.4 var(--font-sans); color: var(--text-muted); margin-top: 7px; }
</style>
</head>
<body>
<h4>Confidence scale · conflict</h4>
<div class="scale">
  <div class="item"><span class="dot" style="background:var(--conf-confirmed)"></span><span class="lvl">Подтверждено</span><span class="pct">95</span><div class="desc">Документ-свидетельство</div></div>
  <div class="item"><span class="dot" style="background:var(--conf-probable)"></span><span class="lvl">Вероятно</span><span class="pct">70</span><div class="desc">Плохо читаемый источник</div></div>
  <div class="item"><span class="dot" style="background:var(--conf-inferred)"></span><span class="lvl">Косвенно</span><span class="pct">45</span><div class="desc">Предположение по признакам</div></div>
  <div class="item"><span class="dot" style="background:var(--conf-hypothesis)"></span><span class="lvl">Гипотеза</span><span class="pct">20</span><div class="desc">Догадка ИИ без подтверждения</div></div>
  <div class="item" style="border-color:var(--conflict-100); background:var(--conflict-050)"><span class="dot" style="background:var(--conflict-500)"></span><span class="lvl">Конфликт</span><div class="desc">Противоречие → задача</div></div>
</div>
</body>
</html>
