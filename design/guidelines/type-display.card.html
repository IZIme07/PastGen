<!-- @dsCard group="Type" viewport="700x180" name="Display & headings · Spectral" subtitle="Literary serif for names, dossier titles, story prose" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--bg-app); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--line); padding-bottom: 12px; }
  .meta { width: 120px; flex: 0 0 auto; font: 11px/1.4 var(--font-mono); color: var(--text-faint); }
  .d  { font: var(--text-display); color: var(--ink-900); letter-spacing: var(--track-tight); }
  .h1 { font: var(--text-h1); color: var(--ink-900); letter-spacing: var(--track-snug); }
  .h2 { font: var(--text-h2); color: var(--ink-900); }
</style>
</head>
<body>
<div class="stack">
  <div class="line"><span class="meta">Display · 44 / 600</span><span class="d">Мария Соколова</span></div>
  <div class="line"><span class="meta">H1 · 32 / 600</span><span class="h1">Семейная история</span></div>
  <div class="line" style="border:none;padding:0"><span class="meta">H2 · 24 / 500</span><span class="h2">Отцовская линия · Тула</span></div>
</div>
</body>
</html>
