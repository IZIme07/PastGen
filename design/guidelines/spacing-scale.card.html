<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing scale" subtitle="4px base rhythm" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--bg-app); }
  .scale { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .bar { background: var(--evergreen-200); border: 1px solid var(--evergreen-400); border-radius: 3px; width: 22px; }
  .nm { font: var(--w-medium) 11px/1 var(--font-sans); color: var(--text-body); }
  .px { font: 10px/1 var(--font-mono); color: var(--text-faint); }
</style>
</head>
<body>
<div class="scale">
  <div class="item"><div class="bar" style="height:4px"></div><div class="nm">1</div><div class="px">4</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="nm">2</div><div class="px">8</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="nm">3</div><div class="px">12</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="nm">4</div><div class="px">16</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="nm">6</div><div class="px">24</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="nm">8</div><div class="px">32</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="nm">12</div><div class="px">48</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="nm">16</div><div class="px">64</div></div>
</div>
</body>
</html>
