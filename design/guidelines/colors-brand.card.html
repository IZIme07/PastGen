<!-- @dsCard group="Colors" viewport="700x150" name="Brand · evergreen & brass" subtitle="Heritage evergreen primary, heirloom brass accent" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg-app); }
  .group { display: flex; gap: 22px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .col h4 { font: var(--w-semibold) 11px/1 var(--font-sans); letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 2px; }
  .swatches { display: flex; gap: 7px; }
  .sw { width: 66px; }
  .chip { height: 46px; border-radius: var(--radius-sm); border: 1px solid rgba(58,47,33,.08); display:flex; align-items:flex-end; padding:5px 6px; }
  .chip .star { font: var(--w-semibold) 10px/1 var(--font-mono); color: rgba(255,255,255,.85); }
  .nm { font: var(--w-medium) 10px/1.3 var(--font-sans); color: var(--text-body); margin-top: 5px; }
  .hx { font: 10px/1.3 var(--font-mono); color: var(--text-faint); }
</style>
</head>
<body>
<div class="group">
  <div class="col">
    <h4>Evergreen · primary</h4>
    <div class="swatches">
      <div class="sw"><div class="chip" style="background:var(--evergreen-800)"></div><div class="nm">800</div></div>
      <div class="sw"><div class="chip" style="background:var(--evergreen-700)"></div><div class="nm">700</div></div>
      <div class="sw"><div class="chip" style="background:var(--evergreen-600)"><span class="star">★ brand</span></div><div class="nm">600</div><div class="hx">#2F5043</div></div>
      <div class="sw"><div class="chip" style="background:var(--evergreen-400)"></div><div class="nm">400</div></div>
      <div class="sw"><div class="chip" style="background:var(--evergreen-100)"></div><div class="nm">100</div></div>
    </div>
  </div>
  <div class="col">
    <h4>Brass · accent</h4>
    <div class="swatches">
      <div class="sw"><div class="chip" style="background:var(--brass-700)"></div><div class="nm">700</div></div>
      <div class="sw"><div class="chip" style="background:var(--brass-600)"></div><div class="nm">600</div></div>
      <div class="sw"><div class="chip" style="background:var(--brass-500)"><span class="star">★ accent</span></div><div class="nm">500</div><div class="hx">#B68A4B</div></div>
      <div class="sw"><div class="chip" style="background:var(--brass-300)"></div><div class="nm">300</div></div>
      <div class="sw"><div class="chip" style="background:var(--brass-100)"></div><div class="nm">100</div></div>
    </div>
  </div>
</div>
</body>
</html>
