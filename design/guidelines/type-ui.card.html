<!-- @dsCard group="Type" viewport="700x190" name="UI & mono · IBM Plex" subtitle="Plex Sans for the working UI, Plex Mono for archival metadata" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--bg-app); }
  .stack { display: flex; flex-direction: column; gap: 13px; }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--line); padding-bottom: 11px; }
  .meta { width: 124px; flex: 0 0 auto; font: 11px/1.4 var(--font-mono); color: var(--text-faint); }
  .h3 { font: var(--text-h3); color: var(--ink-900); }
  .bd { font: var(--text-ui-body); color: var(--ink-700); }
  .sm { font: var(--text-ui-small); color: var(--ink-500); }
  .mn { font: var(--w-medium) 13px/1.5 var(--font-mono); color: var(--ink-700); }
  .ov { font: var(--w-semibold) 11px/1.3 var(--font-sans); letter-spacing: var(--track-overline); text-transform: uppercase; color: var(--ink-500); }
</style>
</head>
<body>
<div class="stack">
  <div class="line"><span class="meta">H3 title · 19 / 600</span><span class="h3">Карточка человека</span></div>
  <div class="line"><span class="meta">Body · 15 / 400</span><span class="bd">ИИ извлекает имена, даты, места и связи из загруженных материалов.</span></div>
  <div class="line"><span class="meta">Small · 13 / 400</span><span class="sm">Источник привязан к утверждению, а не к человеку целиком.</span></div>
  <div class="line"><span class="meta">Mono · 13 / 500</span><span class="mn">1928–2009 · conf 76% · src ×4</span></div>
  <div class="line" style="border:none;padding:0"><span class="meta">Overline · 11</span><span class="ov">Уверенность профиля</span></div>
</div>
</body>
</html>
