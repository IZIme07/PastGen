<!-- @dsCard group="Colors" viewport="700x150" name="Paper & ink" subtitle="Warm archival surfaces and the ink text scale" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg-app); }
  .group { display: flex; gap: 22px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .col h4 { font: var(--w-semibold) 11px/1 var(--font-sans); letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 2px; }
  .swatches { display: flex; gap: 8px; }
  .sw { width: 76px; }
  .chip { height: 46px; border-radius: var(--radius-sm); border: 1px solid rgba(58,47,33,.10); }
  .nm { font: var(--w-medium) 11px/1.3 var(--font-sans); color: var(--text-body); margin-top: 5px; }
  .hx { font: 10px/1.3 var(--font-mono); color: var(--text-faint); }
</style>
</head>
<body>
<div class="group">
  <div class="col">
    <h4>Paper · surfaces</h4>
    <div class="swatches">
      <div class="sw"><div class="chip" style="background:var(--paper-0)"></div><div class="nm">paper-0</div><div class="hx">#FBF8F1</div></div>
      <div class="sw"><div class="chip" style="background:var(--paper-1)"></div><div class="nm">paper-1</div><div class="hx">#F4EEE2</div></div>
      <div class="sw"><div class="chip" style="background:var(--paper-2)"></div><div class="nm">paper-2</div><div class="hx">#ECE4D4</div></div>
      <div class="sw"><div class="chip" style="background:var(--card)"></div><div class="nm">card</div><div class="hx">#FFFDF8</div></div>
    </div>
  </div>
  <div class="col">
    <h4>Ink · text</h4>
    <div class="swatches">
      <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="nm">ink-900</div><div class="hx">#23201B</div></div>
      <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="nm">ink-700</div><div class="hx">#463F35</div></div>
      <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="nm">ink-500</div><div class="hx">#756B5C</div></div>
      <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="nm">ink-300</div><div class="hx">#BBB0A0</div></div>
    </div>
  </div>
</div>
</body>
</html>
